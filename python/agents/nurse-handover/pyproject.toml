[project]
name = "nurse-handover"
version = "0.0.1"
description = "An ADK agent for generating nurse shift handover reports."
authors = [
    { name = "Gopala Dhar", email = "gopalad@google.com" },
    { name = "Naveen Poosarla", email = "naveenpoosarla@google.com" },
    { name = "Pablo Gaeta", email = "pablogaeta@google.com" }
]
classifiers = [
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.13",
]
keywords = ['agent-catalog', 'adk', 'agent']
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "google-adk>=1.10.0",
    "pyyaml>=6.0.2",
    "uvicorn>=0.34.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ipykernel>=6.29.5",
    "ipython>=8.36.0",
    "pytest>=8.3.5",
    "pre-commit>=4.2.0",
    "ruff>=0.11.5",
    "deptry>=0.23.0",
    "pytest-cov>=4.0.0",
    "types-pyyaml>=6.0.12.20250809",
    "basedpyright>=1.31.3",
    "agent-starter-pack>=0.14.1",
    "pytest-asyncio>=0.23.7",
]

[tool.agent_packs]
template = "adk"

[tool.agent-starter-pack]
example_question = "Generate a handover report for a patient named John Doe."

[tool.agent-starter-pack.settings]
agent_directory = "nurse_handover"

[tool.basedpyright]
reportAny = false
reportExplicitAny = false
reportMissingTypeStubs = false
reportUnknownMemberType = false
reportUnknownVariableType = false
typeCheckingMode = "basic"
include = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow",
    "infra_ready: marks tests as requiring cloud infra to be ready",
]

[tool.ruff]
extend = "../../../pyproject.toml"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.coverage.report]
skip_empty = true

[tool.coverage.run]
branch = true
omit = ["server.py"]

[tool.deptry.per_rule_ignores]
DEP002 = ["uvicorn"]

[[tool.uv.index]]
name = "default"
url = "https://pypi.org/simple"
default = true