<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Approvals</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-secondary: #5f6570;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --green: #059669;
      --green-bg: #ecfdf5;
      --green-border: #a7f3d0;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-border: #fecaca;
      --yellow: #d97706;
      --yellow-bg: #fffbeb;
      --yellow-border: #fde68a;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid var(--yellow-border);
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--yellow);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .toolbar p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { background: var(--bg); border-color: #ccc; }

    .btn-approve {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .btn-approve:hover { background: #047857; border-color: #047857; }

    .btn-reject {
      background: white;
      color: var(--red);
      border-color: var(--red-border);
    }

    .btn-reject:hover { background: var(--red-bg); }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .card:hover { box-shadow: var(--shadow-lg); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 24px 0;
    }

    .card-amount {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid var(--yellow-border);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-meta {
      padding: 8px 24px 0;
    }

    .card-meta-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .meta-item {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .meta-item strong {
      color: var(--text);
      font-weight: 500;
    }

    .card-description {
      padding: 12px 24px 0;
      font-size: 0.875rem;
      color: var(--text);
    }

    .card-review {
      margin: 16px 24px 0;
      padding: 14px 16px;
      background: #f0f4ff;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      font-size: 0.8125rem;
      line-height: 1.6;
      color: #1e3a5f;
      white-space: pre-wrap;
    }

    .card-review-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    .card-actions .btn { flex: 1; justify-content: center; padding: 10px; }

    .result-msg {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .result-msg.ok {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-border);
    }

    .result-msg.err {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red-border);
    }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-secondary);
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .empty-state p { font-size: 0.875rem; }

    .loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .session-id {
      padding: 0 24px;
      margin-top: 12px;
    }

    .session-id code {
      font-size: 0.6875rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1>Expense Approvals</h1>
      <div id="count-badge" style="display:none" class="badge">
        <span class="dot"></span>
        <span id="count-text">0 pending</span>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="toolbar">
      <p id="toolbar-text">Loading expenses...</p>
      <button class="btn" onclick="loadPending()">Refresh</button>
    </div>
    <div id="pending-list">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    const BASE = window.location.origin;
    const APP = 'expense_agent';

    function formatCurrency(amount) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
      }).format(amount);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
      } catch { return dateStr; }
    }

    function truncateReview(text, maxLen) {
      if (!text || text.length <= maxLen) return text || '';
      return text.substring(0, maxLen).trim() + '...';
    }

    async function loadPending() {
      const el = document.getElementById('pending-list');
      const badge = document.getElementById('count-badge');
      const countText = document.getElementById('count-text');
      const toolbarText = document.getElementById('toolbar-text');

      el.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`${BASE}/pending-approvals`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const items = await res.json();

        if (items.length === 0) {
          badge.style.display = 'none';
          toolbarText.textContent = 'No expenses require your attention.';
          el.innerHTML = `
            <div class="empty-state">
              <div class="icon">&#9989;</div>
              <h3>All clear</h3>
              <p>No expenses pending approval.</p>
            </div>`;
          return;
        }

        badge.style.display = 'inline-flex';
        countText.textContent = `${items.length} pending`;
        toolbarText.textContent = `${items.length} expense${items.length > 1 ? 's' : ''} waiting for your review.`;

        el.innerHTML = items.map(item => {
          const p = item.payload || {};
          const amount = formatCurrency(p.amount || 0);
          const date = formatDate(p.date);
          const review = item.review || '';

          return `
          <div class="card" id="card-${item.session_id}">
            <div class="card-header">
              <span class="card-amount">${amount}</span>
              <span class="card-status-badge">Pending Review</span>
            </div>
            <div class="card-meta">
              <div class="card-meta-row">
                <span class="meta-item"><strong>${p.submitter || 'Unknown'}</strong></span>
                <span class="meta-item">${p.category || 'Uncategorized'}</span>
                ${date ? `<span class="meta-item">${date}</span>` : ''}
              </div>
            </div>
            ${p.description ? `<div class="card-description">${p.description}</div>` : ''}
            ${review ? `
              <div class="card-review">
                <div class="card-review-label">AI Review</div>
                ${review}
              </div>
            ` : ''}
            <div class="session-id">
              <code>Session: ${item.session_id}</code>
            </div>
            <div class="card-actions">
              <button class="btn btn-approve" onclick="decide('${item.user_id}', '${item.session_id}', '${item.interrupt_id}', 'approve', this)">Approve</button>
              <button class="btn btn-reject" onclick="decide('${item.user_id}', '${item.session_id}', '${item.interrupt_id}', 'reject', this)">Reject</button>
            </div>
          </div>`;
        }).join('');
      } catch (e) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="icon">&#9888;&#65039;</div>
            <h3>Connection error</h3>
            <p>${e.message}</p>
          </div>`;
      }
    }

    async function decide(userId, sessionId, interruptId, decision, btn) {
      const card = document.getElementById(`card-${sessionId}`);
      const buttons = card.querySelectorAll('.btn-approve, .btn-reject');
      buttons.forEach(b => b.disabled = true);

      try {
        const res = await fetch(`${BASE}/approve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            appName: APP,
            userId: userId,
            sessionId: sessionId,
            newMessage: {
              role: 'user',
              parts: [{
                functionResponse: {
                  id: interruptId,
                  name: 'adk_request_input',
                  response: { result: JSON.stringify({ decision: decision }) }
                }
              }]
            }
          })
        });

        const actionsDiv = card.querySelector('.card-actions');
        const statusBadge = card.querySelector('.card-status-badge');

        if (res.ok) {
          const events = await res.json();
          const lastEvent = events[events.length - 1];
          const agentMessage = lastEvent?.output?.message
            || `Expense ${decision === 'approve' ? 'approved' : 'rejected'}.`;

          const msgClass = decision === 'approve' ? 'ok' : 'err';
          actionsDiv.innerHTML = `<div class="result-msg ${msgClass}">${agentMessage}</div>`;
          statusBadge.textContent = decision === 'approve' ? 'Approved' : 'Rejected';
          statusBadge.style.background = decision === 'approve' ? 'var(--green-bg)' : 'var(--red-bg)';
          statusBadge.style.color = decision === 'approve' ? 'var(--green)' : 'var(--red)';
          statusBadge.style.borderColor = decision === 'approve' ? 'var(--green-border)' : 'var(--red-border)';

          // Update count
          const countText = document.getElementById('count-text');
          const currentCount = parseInt(countText.textContent) - 1;
          if (currentCount <= 0) {
            document.getElementById('count-badge').style.display = 'none';
            document.getElementById('toolbar-text').textContent = 'No expenses require your attention.';
          } else {
            countText.textContent = `${currentCount} pending`;
          }
        } else {
          const err = await res.text();
          actionsDiv.innerHTML += `<div class="result-msg err">Error: ${err}</div>`;
          buttons.forEach(b => b.disabled = false);
        }
      } catch (e) {
        const actionsDiv = card.querySelector('.card-actions');
        actionsDiv.innerHTML += `<div class="result-msg err">Network error: ${e.message}</div>`;
        buttons.forEach(b => b.disabled = false);
      }
    }

    loadPending();
  </script>
</body>
</html>
