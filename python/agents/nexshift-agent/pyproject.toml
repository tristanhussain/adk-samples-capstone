[project]
name = "nexshift-agent"
version = "0.1.0"
description = "Solve the Staffing Puzzle Instantly with AI Optimization."
authors = [
    {name = "CC Chen", email = "chuancc@google.com"},
    {name = "Amber Pan", email = "amberpq@google.com"},
]
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "google-adk>=1.28.1",
    "google-genai>=1.70.0",
    "ortools>=9.14.6206",
    "pydantic>=2.12.5",
    "typing-extensions>=4.15.0",
]

[tool.uv]
index-url = "https://pypi.org/simple"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.4.6,<1.0.0",
    "ty>=0.0.1a0",
    "codespell>=2.2.0,<3.0.0",
]

[tool.ruff]
# extends the ruff rules established in the root .toml
extend = "../../../pyproject.toml"

[tool.ruff.lint]
ignore = [
    "C901",     # Too complex - domain functions have inherent complexity
    "PLR0912",  # Too many branches
    "PLR0915",  # Too many statements
    "PLR0911",  # Too many return statements
    "PLW0603",  # Global statement - used in test fixtures
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"deployment/deploy.py" = ["PLC0415"]  # Deferred import to avoid heavy agent init on non-deploy commands