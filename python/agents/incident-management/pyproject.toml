[project]
name = "incident-management"
version = "0.1.0"
description = "AI agent that allows you to manage and create Incidents in ServiceNow"
authors = [
    {name = "Sai Saran Vaidyanathan", email = "ssvaidyanathan@google.com"},
    {name = "Matt Hartmann", email = "hartmannm@google.com"}
]
license = {text = "Apache License 2.0"}
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "google-adk>=1.5.0,<2.0.0",
    "google-cloud-aiplatform[adk,agent-engines]>=1.100.0,<2.0.0",
    "python-dotenv>=1.1.1,<2.0.0",
    "google-cloud-secret-manager>=2.24.0,<3.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "google-adk[eval]>=1.0.0",
    "nest-asyncio>=1.6.0",
    "agent-starter-pack>=0.14.1",
]
deployment = [
    "absl-py>=2.2.2",
]

[tool.ruff]
# Point back to the Master template in the root
extend = "../../../pyproject.toml"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402", "F401"]

[tool.ruff.lint.isort]
# CRITICAL: Ensures the incident management source is treated as first-party
known-first-party = ["incident_management"]

[tool.hatch.build.targets.wheel]
# Explicitly mapping the package folder to avoid discovery errors
packages = ["incident_management"]

[tool.pytest.ini_options]
pythonpath = "."
asyncio_default_fixture_loop_scope = "function"

[tool.agent-starter-pack]
example_question = "List all open incidents"
deployment_targets = ["agent_engine", "cloud_run"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"