# Invoice Processing Master Data
# Reference implementation — codifies the current invoice processing system's
# hardcoded values into a machine-readable format. All other framework components
# (eval, investigation, ALF, learning agent) read from this file.
#
# Generated by: bootstrap_agent.py (or manually authored)
# Source agent: acting_agent/general_invoice_agent.py v1.1.1

version: "1.1.1"
domain: "invoice_processing"
display_name: "Invoice Processing"

# ============================================================================
# Section 1: Document Types — What documents come in, how to classify them
# ============================================================================
document_types:
  primary:
    id: "invoice"
    display_name: "Invoice"
    classification_indicators:
      - "Invoice number field"
      - "Line items table with amounts"
      - "Total amounts (subtotal, tax, grand total)"
      - "Vendor business details and tax ID"
  supporting:
    - id: "work_authorization"
      display_name: "Work Authorization Form"
      classification_indicators:
        - "Work authorization/WAF header"
        - "Site attendance records"
        - "Authorized hours"
        - "Technician signatures"
      required_config_key: "require_work_authorization"

# ============================================================================
# Section 2: Extraction Schemas — What fields to extract from each doc type
# ============================================================================
extraction_schemas:
  invoice:
    fields:
      - name: "invoice_number"
        type: "string"
        required: true
        default: "UNKNOWN"
        prompt_hint: "Unique invoice identifier"
      - name: "invoice_date"
        type: "string"
        format: "date"
        required: true
        prompt_hint: "Invoice date in YYYY-MM-DD format"
      - name: "invoice_total_inc_tax"
        type: "float"
        required: true
        default: 0.0
        prompt_hint: "Total amount including tax"
      - name: "invoice_total_ex_tax"
        type: "float"
        required: true
        default: 0.0
        prompt_hint: "Total amount excluding tax (subtotal)"
      - name: "tax_amount"
        type: "float"
        default: 0.0
        prompt_hint: "Tax amount"
      - name: "vendor_tax_id"
        type: "string"
        required: false
        prompt_hint: "Vendor's tax identification number (ABN, VAT, EIN)"
      - name: "vendor_name"
        type: "string"
        required: true
        default: "UNKNOWN"
        prompt_hint: "Vendor business name"
      - name: "customer_name"
        type: "string"
        required: false
        prompt_hint: "Customer/recipient name the invoice is addressed to"
      - name: "currency"
        type: "string"
        default: "AUD"
        prompt_hint: "ISO currency code"
    line_item_schema:
      fields:
        - name: "description"
          type: "string"
          required: true
        - name: "quantity"
          type: "float"
          required: false
        - name: "unit_price"
          type: "float"
          required: false
        - name: "amount_ex_tax"
          type: "float"
          required: false
        - name: "tax_code"
          type: "string"
          default: "TAX"
        - name: "tax_amount"
          type: "float"
          required: false
        - name: "amount_inc_tax"
          type: "float"
          required: false

  work_authorization:
    fields:
      - name: "reference_number"
        type: "string"
        prompt_hint: "Work authorization reference number"
      - name: "site_name"
        type: "string"
        prompt_hint: "Site name"
      - name: "authorized_hours"
        type: "float"
        prompt_hint: "Total authorized hours"
      - name: "work_description"
        type: "string"
        prompt_hint: "Description of work"
      - name: "technician_name"
        type: "string"
        prompt_hint: "Technician name"
      - name: "date"
        type: "string"
        format: "date"
        prompt_hint: "Date of work authorization"

# ============================================================================
# Section 3: Taxonomies — Classification categories, mappings, normalizations
# ============================================================================
taxonomies:
  item_codes:
    values:
      - LABOUR
      - LABOUR_AH
      - PARTS
      - FREIGHT
      - TRAVEL
      - CALLOUT
      - HIRE
      - CLEANING
      - OTHER
    classification_method: "llm"  # "llm", "keyword", "hybrid"
    llm_descriptions:
      LABOUR: "Work performed by technicians, engineers, tradespeople. Includes service calls, inspections, diagnostics, calibration, testing, system checks, standard-hours work."
      LABOUR_AH: "After-hours or overtime labour only."
      PARTS: "Physical materials, components, equipment, replacement parts, filters, coils, fittings, valves, units, supplies, consumables."
      FREIGHT: "Delivery, shipping, freight charges."
      TRAVEL: "Travel time, mileage, kilometre charges, travel allowances."
      CALLOUT: "Call-out fees, attendance fees, minimum charges for site visits."
      HIRE: "Equipment hire or rental charges."
      CLEANING: "Cleaning services, janitorial work."
      OTHER: "Only if the description truly does not fit any of the above categories."
    keyword_fallback:
      LABOUR: [labour, labor, technician, installation, service, calibration, diagnostics, inspection, repair]
      LABOUR_AH: [after hours, overtime, "a/h", after-hours]
      PARTS: [parts, material, component, supply, filter, coil, fitting, valve, unit, equipment, replacement]
      FREIGHT: [freight, delivery, shipping]
      TRAVEL: [travel, mileage, kilometre, kilometer]
      CALLOUT: [call out, callout, attendance]
      HIRE: [hire, rental]
      CLEANING: [cleaning, clean]

  work_types:
    values: [REPAIRS, PREVENTATIVE, CLEANING, EMERGENCY]
    default: "REPAIRS"
    keyword_map:
      PREVENTATIVE: [preventative, pm, scheduled, maintenance]
      CLEANING: [cleaning, clean, janitorial]
      EMERGENCY: [emergency, urgent, "after hours"]
      REPAIRS: []  # default fallback

  tax_code_normalization:
    GST: TAX
    gst: TAX
    Gst: TAX
    VAT: TAX
    vat: TAX

  decision_status_mapping:
    ACCEPT: "Pending Payment"
    REJECT: "Rejected"
    SET_ASIDE: "To Verify"
    ERROR: "To Verify"

# ============================================================================
# Section 4: Validation Pipeline — Phase definitions with steps as data
# ============================================================================
validation_pipeline:
  phases:
    - id: "phase1"
      name: "Initial Intake"
      artifact: "03_phase1_validation.json"
      steps:
        - id: "1.1"
          name: "Extraction Success"
          type: "check_field"
          field: "extraction_failed"
          expect: false
          rejection_template: "Document is not a valid Tax Invoice"

        - id: "1.2"
          name: "Customer Verification"
          type: "name_contains_any"
          field: "extraction.invoice.customer_name"
          values_from_config: "organization_names"
          skip_if_empty: true
          rejection_template: "Invoice addressed to different company"

        - id: "1.3"
          name: "Tax Compliance"
          type: "all_fields_present"
          fields:
            - "extraction.invoice.vendor_tax_id"
            - "extraction.invoice.invoice_date"
            - "extraction.invoice.vendor_name"
          exclude_values: ["UNKNOWN", ""]
          rejection_template: "Document is not a Tax Invoice"

        - id: "1.4"
          name: "Work Authorization Check"
          type: "conditional_waf"
          enabled_when_config: "require_work_authorization"
          exempt_work_types_config: "waf_exempt_work_types"
          rejection_template: "Missing Work Authorization Form"

        - id: "1.5"
          name: "Single Document Check"
          type: "max_count"
          field: "classification.invoice_count"
          max: 1
          rejection_template: "Multiple invoices in submission"

    - id: "phase2"
      name: "Content Validation"
      artifact: "04_phase2_validation.json"
      steps:
        - id: "2.1"
          name: "Line Items Present"
          type: "min_count"
          field: "extraction.invoice.line_items"
          min: 1
          rejection_template: "Invoice charges not itemized"

        - id: "2.2"
          name: "PO Validation"
          type: "conditional_placeholder"
          enabled_when_config: "require_purchase_order"
          rejection_template: "Invalid purchase order"

    - id: "phase3"
      name: "External Validation"
      artifact: "05_phase3_validation.json"
      steps:
        - id: "3.1"
          name: "Duplicate Detection"
          type: "conditional_placeholder"
          enabled_when_config: "duplicate_check_enabled"
          rejection_template: "Invoice already processed"

        - id: "3.2"
          name: "Tax ID Validation"
          type: "validate_tax_id"
          field: "extraction.invoice.vendor_tax_id"
          format_from_config: "tax_id_format"
          enabled_when_config: "validate_tax_id_checksum"
          rejection_template: "Vendor tax ID invalid"

        - id: "3.3"
          name: "Future Date Check"
          type: "not_future_date"
          field: "extraction.invoice.invoice_date"
          rejection_template: "Invoice is future dated"

    - id: "phase4"
      name: "Calculation Validation"
      artifact: "06_phase4_validation.json"
      terminal_decision: "ACCEPT"
      steps:
        - id: "4.1"
          name: "Total Verification"
          type: "balance_check"
          total_field: "extraction.invoice.invoice_total_inc_tax"
          addend_fields:
            - "extraction.invoice.invoice_total_ex_tax"
            - "extraction.invoice.tax_amount"
          tolerance_from_config: "balance_tolerance"
          informational_only: true

        - id: "4.2"
          name: "Line Sum Validation"
          type: "sum_matches"
          items_field: "extraction.invoice.line_items"
          sum_field: "amount_ex_tax"
          expected_total_field: "extraction.invoice.invoice_total_ex_tax"
          tolerance_from_config: "line_sum_tolerance"
          rejection_template: "Invoice amounts do not reconcile"

        - id: "4.3"
          name: "Authorization Hours Check"
          type: "hours_within_authorization"
          enabled_when_config: "require_work_authorization"
          exempt_work_types_config: "waf_exempt_work_types"
          labour_keywords_from: "labour_detection.keywords"
          authorized_hours_field: "extraction.work_authorization.authorized_hours"
          tolerance_from_config: "hours_tolerance"
          rejection_template: "Invoice does not match work authorization"

# ============================================================================
# Section 5: Output Schema — Structure of Postprocessing_Data.json
# ============================================================================
output_schema:
  filename: "Postprocessing_Data.json"
  sections:
    - key: "Invoice Processing"
      fields:
        - name: "Invoice Type"
          value: "Normal"
        - name: "Invoice Status"
          from_decision_mapping: true
        - name: "Invoice Source"
          value: "Email"

    - key: "Invoice Details"
      fields:
        - name: "Vendor Invoice"
          source: "extraction.invoice.invoice_number"
        - name: "Invoice Date"
          source: "extraction.invoice.invoice_date"
        - name: "Invoice Total"
          source: "extraction.invoice.invoice_total_inc_tax"
          format: "currency"
        - name: "Pretax Total"
          source: "extraction.invoice.invoice_total_ex_tax"
          format: "currency"
        - name: "Tax Amount"
          source: "extraction.invoice.tax_amount"
          format: "currency"
        - name: "Currency"
          source: "extraction.invoice.currency"

    - key: "Vendor Information"
      fields:
        - name: "Vendor Name"
          source: "extraction.invoice.vendor_name"
        - name: "Tax ID"
          source: "extraction.invoice.vendor_tax_id"

    - key: "Line Items"
      source: "transformer.line_items_mapped"
      format: "json_string"

    - key: "Outcome Message"
      fields:
        - name: "Outcome Message"
          templates:
            ACCEPT: "Invoice accepted for payment on {timestamp}"
            REJECT: "Invoice rejected on {timestamp}: {rejection_reason}"
            default: "Invoice requires review as of {timestamp}"

# ============================================================================
# Section 6: Eval Comparison Schema — What eval.py compares
# ============================================================================
eval_schema:
  decision:
    path: "Invoice Processing.Invoice Status"
    status_to_decision:
      "pending payment": "ACCEPT"
      "rejected": "REJECT"
      "to verify": "SET_ASIDE"

  comparison_groups:
    - id: "financials"
      display_name: "Financial Accuracy"
      section: "Invoice Details"
      fields:
        - { name: "Invoice Total", type: "amount" }
        - { name: "Pretax Total", type: "amount" }
        - { name: "Tax Amount", type: "amount" }
        - { name: "Currency", type: "string" }

    - id: "vendor"
      display_name: "Vendor Accuracy"
      section: "Vendor Information"
      fields:
        - { name: "Vendor Name", type: "string" }
        - { name: "Tax ID", type: "string" }

    - id: "header"
      display_name: "Header Accuracy"
      section: "Invoice Details"
      fields:
        - { name: "Vendor Invoice", type: "string" }
        - { name: "Invoice Date", type: "string" }

    - id: "line_items"
      display_name: "Line Item Accuracy"
      source: "Line Items"
      type: "array"
      per_line_fields:
        - { name: "item_code", type: "string" }
        - { name: "description", type: "string" }
        - { name: "quantity", type: "amount" }
        - { name: "unit_cost", type: "amount" }
        - { name: "line_cost", type: "amount" }
        - { name: "tax", type: "amount" }
        - { name: "tax_code", type: "string" }

# ============================================================================
# Section 7: Investigation Mapping
# ============================================================================
investigation:
  agent_file_map:
    classification: "01_classification.json"
    extraction: "02_extraction.json"
    phase1: "03_phase1_validation.json"
    phase2: "04_phase2_validation.json"
    phase3: "05_phase3_validation.json"
    phase4: "06_phase4_validation.json"
    transformation: "07_transformation.json"
    final_decision: "08_decision.json"
    audit_log: "09_audit_log.json"
    postprocessing: "Postprocessing_Data.json"

  expected_extraction_fields:
    - vendor_name
    - invoice_number
    - invoice_date
    - invoice_total_inc_tax
    - invoice_total_ex_tax
    - vendor_tax_id
    - line_items

  reject_status_values:
    - "Reject"
    - "Set Aside"
    - "REJECT"
    - "SET_ASIDE"

# ============================================================================
# Section 8: Config Defaults
# ============================================================================
config_defaults:
  organization_names: ["ACME Corp", "ACME Corporation", "ACME Ltd"]
  default_tax_rate: 0.10
  tax_rates_by_currency:
    AUD: 0.10
    NZD: 0.15
    USD: 0.00
    EUR: 0.20
  require_work_authorization: false
  waf_exempt_work_types: ["PREVENTATIVE", "CLEANING"]
  waf_exempt_vendors: []
  require_purchase_order: false
  valid_po_prefixes: ["PO", "WO", "PR"]
  duplicate_check_enabled: false
  duplicate_check_type: "none"
  balance_tolerance: 0.02
  line_sum_tolerance: 1.00
  hours_tolerance: 0.5
  validate_tax_id_checksum: true
  tax_id_format: "ABN"

# ============================================================================
# Section 9: Labour/Hours Detection
# ============================================================================
labour_detection:
  keywords: [labour, labor, technician, hours]
  quantity_field: "quantity"
  description_field: "description"

# ============================================================================
# Section 10: Artifact Naming
# ============================================================================
artifacts:
  classification: "01_classification.json"
  extraction: "02_extraction.json"
  transformation: "07_transformation.json"
  decision: "08_decision.json"
  audit_log: "09_audit_log.json"
  postprocessing: "Postprocessing_Data.json"

# ============================================================================
# Section 11: Rejection Templates (complete list)
# ============================================================================
rejection_templates:
  - { id: "not_valid_document", template: "Document is not a valid Tax Invoice", phase: "phase1", step: "1.1" }
  - { id: "wrong_customer", template: "Invoice addressed to different company", phase: "phase1", step: "1.2" }
  - { id: "not_tax_compliant", template: "Document is not a Tax Invoice", phase: "phase1", step: "1.3" }
  - { id: "missing_waf", template: "Missing Work Authorization Form", phase: "phase1", step: "1.4" }
  - { id: "multiple_documents", template: "Multiple invoices in submission", phase: "phase1", step: "1.5" }
  - { id: "no_line_items", template: "Invoice charges not itemized", phase: "phase2", step: "2.1" }
  - { id: "duplicate", template: "Invoice already processed", phase: "phase3", step: "3.1" }
  - { id: "invalid_tax_id", template: "Vendor tax ID invalid", phase: "phase3", step: "3.2" }
  - { id: "future_dated", template: "Invoice is future dated", phase: "phase3", step: "3.3" }
  - { id: "amounts_mismatch", template: "Invoice amounts do not reconcile", phase: "phase4", step: "4.2" }
  - { id: "waf_hours_exceeded", template: "Invoice does not match work authorization", phase: "phase4", step: "4.3" }
