[project]
name = "youtube-analyst"
version = "0.1.0"
description = "A Gemini-powered agent for analyzing YouTube data."
authors = [
    { name = "Pili Hu", email = "hupili@google.com" },
    { name = "Jasmine Tong", email = "jasminetong@google.com" },
    { name = "Kun Wang", email = "kunwk@google.com" },
]
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "google-adk>=1.27.4",
    "google-genai>=0.2.0",
    "google-api-python-client",
    "matplotlib",
    "plotly",
    "pandas",
    "pydantic",
    "pydantic-settings",
    "youtube-transcript-api",
    "google-cloud-storage",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.4.6",
    "agent-starter-pack>=0.32.0",
]

[tool.ruff]
extend = "../../../pyproject.toml"

[tool.ruff.lint.isort]
known-first-party = ["youtube_analyst"]

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.agent-starter-pack]
example_question = "Find the top 5 videos about 'Generative AI' from the last month and plot their view counts."

[tool.agent-starter-pack.settings]
agent_directory = "youtube_analyst"
