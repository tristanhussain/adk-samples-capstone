[project]
name = "small-business-loan-agent"
version = "0.1.0"
description = "A multi-agent system that automates small business loan processing with human-in-the-loop approval and repair & resume support."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = "Apache-2.0"
authors = [
    { name = "Nora Filali", email = "nora.filali@google.com" },
    { name = "Neil Desai", email = "nmdesai@google.com" },
]
maintainers = [
    { name = "Nora Filali", email = "nora.filali@google.com" },
    { name = "Neil Desai", email = "nmdesai@google.com" },
]
dependencies = [
    "google-adk>=1.27.4",
    "google-cloud-firestore>=2.21.0",
    "reportlab>=4.4.10",
    "google-cloud-aiplatform[adk,agent-engines]>=1.93.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "google-adk[eval]>=1.27.4",
    "nest-asyncio>=1.6.0",
    "agent-starter-pack>=0.14.1",
    "ipykernel>=6.29.0",
]

[project.optional-dependencies]
lint = [
    "ruff>=0.9.0",
]

[tool.ruff]
# extends the ruff rules established in the root .toml
extend = "../../../pyproject.toml"
line-length = 120

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["PLR2004"]


[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

# This configuration file is used by goo.gle/agent-starter-pack to power remote templating.
# It defines the template's properties and settings.
[tool.agent-starter-pack]
example_question = "Process this loan application for SBL-2025-00142"

[tool.agent-starter-pack.settings]
agent_directory = "small_business_loan_agent"
