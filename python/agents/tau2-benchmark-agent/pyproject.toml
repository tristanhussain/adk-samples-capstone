[project]
name = "tau2-benchmark-agent"
version = "0.1.0"
description = "ADK Agent for Tau2-Bench benchmark evaluation using Google ADK"
authors = [{ name = "Google ADK Team", email = "no-reply@google.com" }]
license = {text = "Apache License 2.0"}
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "google-adk==1.19.0",
    "google-genai==1.51.0",
    "loguru==0.7.3",
    "tenacity==9.1.2",
    "tau2", # Just the name here
]

[tool.uv.sources]
tau2 = { git = "https://github.com/sierra-research/tau2-bench.git", rev = "cc97b34" }

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "agent-starter-pack>=0.32.0",
]

[tool.pytest.ini_options]
pythonpath = "."
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
extend = "../../../pyproject.toml"

[tool.ruff.lint.isort]
known-first-party = ["tau2_agent"]

[tool.hatch.build.targets.wheel]
packages = ["tau2_agent"]

[tool.agent-starter-pack]
example_question = "Can you run the tau2-bench evaluation on the airline domain?"

[tool.agent-starter-pack.settings]
agent_directory = "tau2_agent"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"